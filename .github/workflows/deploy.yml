name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Replace API keys
        run: |
          sed -i "s|YOUR_OPENAI_KEY|${{ secrets.OPENAI_API_KEY }}|g" index.html
          sed -i "s|YOUR_ESV_KEY|${{ secrets.ESV_API_KEY }}|g" index.html
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
