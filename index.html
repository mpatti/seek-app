<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seek - Find Truth</title>
  <!-- Vercel environment variables injection -->
  <script>
    window.ESV_API_KEY = "ESV_API_KEY_PLACEHOLDER";
    window.OPENAI_API_KEY = "OPENAI_API_KEY_PLACEHOLDER";
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0a0a;
      --bg-secondary: #141414;
      --card: #1a1a1a;
      --card-hover: #222;
      --accent: #e8c547;
      --accent-glow: rgba(232, 197, 71, 0.3);
      --text: #f5f5f5;
      --text-secondary: #888;
      --text-muted: #555;
      --border: #2a2a2a;
      --success: #4ade80;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .main-layout {
      display: flex;
      gap: 30px;
      min-height: 500px;
    }
    
    .left-column {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    
    .right-column {
      flex: 1;
      min-width: 0;
      max-width: 450px;
      display: flex;
      flex-direction: column;
    }
    
    @media (max-width: 800px) {
      .main-layout {
        flex-direction: column;
      }
      .right-column {
        max-width: 100%;
      }
    }
    
    /* Header */
    header {
      text-align: center;
      padding: 40px 0;
    }
    
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    
    .logo span {
      color: var(--accent);
    }
    
    .tagline {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 300;
    }
    
    /* Onboarding */
    .onboarding {
      display: none;
    }
    
    .onboarding.active {
      display: block;
    }
    
    .question-card {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    
    .question {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .option-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      font-family: inherit;
    }
    
    .option-btn:hover {
      background: var(--card-hover);
      border-color: var(--accent);
    }
    
    .option-btn.selected {
      background: rgba(232, 197, 71, 0.1);
      border-color: var(--accent);
    }
    
    .continue-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 18px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      font-family: inherit;
    }
    
    .continue-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px var(--accent-glow);
    }
    
    /* Main App */
    .app {
      display: block;
    }
    
    .app.active {
      display: block;
    }
    
    /* Search Bar */
    .search-container {
      margin-bottom: 20px;
    }
    
    .search-input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    
    .search-input:focus {
      border-color: var(--accent);
    }
    
    /* Daily Passage */
    .daily-passage {
      background: var(--card);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    
    .daily-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    
    .daily-topic {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    
    .daily-ref {
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    
    .daily-text {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 16px;
    }
    
    .daily-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .search-results {
      margin-top: 15px;
    }
    
    .search-result {
      background: var(--card);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    
    .search-result:hover {
      border-color: var(--accent);
    }
    
    .search-result-ref {
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 5px;
    }
    
    .search-result-preview {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    
    /* Back Button */
    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 15px;
      transition: all 0.2s;
    }
    
    .back-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    
    /* Passage Card */
    .passage-card {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    
    .passage-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 15px;
    }
    
    .passage-reference {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    
    .passage-text {
      font-size: 1.1rem;
      line-height: 1.9;
      color: var(--text-secondary);
    }
    
    .passage-text p {
      margin-bottom: 1.2em;
    }
    
    .passage-text .verse-num {
      color: var(--accent);
      font-weight: 600;
      margin-right: 4px;
    }
    
    .context-btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: var(--card-hover);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .context-btn:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    
    /* Commentary */
    .commentary-card {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    
    .commentary-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .commentary-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #f5a623);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    
    .commentary-name {
      font-weight: 600;
      font-size: 1.1rem;
    }
    
    .commentary-role {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    
    .commentary-text {
      color: var(--text-secondary);
      line-height: 1.8;
      font-size: 1rem;
    }
    
    /* Chat */
    .chat-card {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: calc(100% - 20px);
    }
    
    .chat-messages {
      flex: 1;
      min-height: 200px;
      max-height: 500px;
      overflow-y: auto;
      margin-bottom: 15px;
    }
    
    .chat-message {
      margin-bottom: 15px;
      padding: 15px;
    }
    
    .chat-suggestions {
      margin-top: 10px;
      padding-top: 10px;
    }
    
    .suggestion-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      margin-right: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .suggestion-btn:hover {
      background: var(--accent);
      color: var(--bg);
    }
      border-radius: 12px;
      max-width: 85%;
    }
    
    .chat-message.user {
      background: rgba(232, 197, 71, 0.1);
      border: 1px solid var(--accent);
      margin-left: auto;
    }
    
    .chat-message.ai {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }
    
    .chat-input-wrapper {
      display: flex;
      gap: 10px;
    }
    
    .chat-disclaimer {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 12px;
    }
    
    .chat-input {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 15px;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
    }
    
    .chat-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .send-btn {
      background: var(--accent);
      border: none;
      color: #000;
      padding: 15px 25px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* Share */
    .share-section {
      text-align: center;
      padding: 30px 0;
    }
    
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Vercel will inject env vars here - or add manually -->
  <script>
    // For Vercel: Add your keys here, or set window.__ENV__ in Vercel dashboard
    window.__ENV__ = window.__ENV__ || {};
  </script>
  <div class="container">
    <header>
      <div class="logo">Seek<span>.</span></div>
      <p class="tagline">Truth. Not trends.</p>
    </header>
    
    <!-- Main App -->
    <div class="app" id="app">
      <div class="search-container" id="searchContainer">
        <div class="daily-passage" id="dailyPassage" style="display:none;">
          <p class="daily-label">Today's Passage</p>
          <h3 class="daily-topic" id="dailyTopic"></h3>
          <p class="daily-ref" id="dailyRef"></p>
          <p class="daily-text" id="dailyText"></p>
          <button class="daily-btn" onclick="loadDailyPassageFromButton()">Explore This Passage →</button>
        </div>
        <input type="text" class="search-input" id="searchInput" placeholder="Search any topic or verse...">
        <div class="search-results" id="searchResults"></div>
      </div>
      
      <div class="main-layout" id="mainLayout" style="display:none;">
        <div class="left-column">
          <button class="back-btn" onclick="goBack()">← Back to Search</button>
          <div class="passage-card" id="passageCard">
            <div class="passage-label" id="passageLabel">📖 Passage of the Day</div>
            <div class="passage-reference" id="passageRef">Loading...</div>
            <div class="passage-text" id="passageText">...</div>
            <button class="context-btn" id="contextBtn" onclick="loadFullChapter()" style="display:none;">📖 Show Full Chapter</button>
          </div>
        </div>
        
        <div class="right-column">
          <div class="chat-card">
            <div class="chat-messages" id="chatMessages">
            </div>
            <div class="chat-input-wrapper">
              <input type="text" class="chat-input" id="chatInput" placeholder="Ask anything...">
              <button class="send-btn" id="sendBtn">→</button>
            </div>
            <p class="chat-disclaimer">Chat with AI. For spiritual matters, consult a pastor or church community.</p>
          </div>
        </div>
      </div>
      
      <div class="share-section">
        <button class="share-btn" id="shareBtn">
          📤 Share Seek with a Friend
        </button>
      </div>
    </div>
  </div>
  
  <script>
    // App State
    let passageData = null;
    let chatHistory = [];
    
    // ESV API Config - reads from Vercel environment variables injected at runtime
    const ESV_API_KEY = window.ESV_API_KEY || '';
    const OPENAI_KEY = window.OPENAI_API_KEY || '';
    
    document.addEventListener('DOMContentLoaded', () => {
      // App starts with just search - nothing else loads until user searches
      loadDailyPassage();
    });
    
    async function loadDailyPassage() {
      try {
        const response = await fetch('/api/daily');
        const data = await response.json();
        
        if (data.reference) {
          document.getElementById('dailyTopic').textContent = data.topic;
          document.getElementById('dailyRef').textContent = data.reference;
          document.getElementById('dailyText').textContent = data.text;
          document.getElementById('dailyPassage').style.display = 'block';
          
          // Store for when user clicks
          window.dailyData = data;
        }
      } catch (error) {
        console.log('Daily passage not available');
      }
    }
    
    window.loadDailyPassageFromButton = function() {
      if (window.dailyData) {
        window.selectSearchResult(window.dailyData.reference, window.dailyData.topic);
      }
    };
    
    // Search functionality
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      const query = e.target.value.trim();
      
      if (query.length < 2) {
        document.getElementById('searchResults').innerHTML = '';
        return;
      }
      
      searchTimeout = setTimeout(() => performSearch(query), 500);
    });
    
    async function performSearch(query) {
      const resultsEl = document.getElementById('searchResults');
      resultsEl.innerHTML = '<div style="color: var(--text-secondary); padding: 10px;">Searching...</div>';
      
      try {
        const response = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        const data = await response.json();
        
        if (data.error) throw new Error(data.error);
        
        if (!data.results || data.results.length === 0) {
          resultsEl.innerHTML = '<div style="color: var(--text-secondary); padding: 10px;">No results found. Try a different search.</div>';
          return;
        }
        
        resultsEl.innerHTML = data.results.map(r => `
          <div class="search-result" data-ref="${r.reference.replace(/"/g, '&quot;')}" data-query="${query.replace(/"/g, '&quot;')}">
            <div class="search-result-ref">${r.reference}</div>
            <div class="search-result-preview">${r.preview}</div>
          </div>
        `).join('');
        
        // Add click handlers
        document.querySelectorAll('.search-result').forEach(el => {
          el.addEventListener('click', () => {
            const ref = el.dataset.ref;
            const query = el.dataset.query;
            window.selectSearchResult(ref, query);
          });
        });
      } catch (error) {
        console.error('Search error:', error);
        resultsEl.innerHTML = '<div style="color: var(--text-secondary); padding: 10px;">Search failed. Try again.</div>';
      }
    }
    
    window.selectSearchResult = async function(reference, searchQuery) {
      // Show main layout when user selects a verse
      document.getElementById('mainLayout').style.display = 'flex';
      document.getElementById('app').classList.add('active');
      document.getElementById('searchContainer').style.display = 'none';
      
      // Store original search for context
      window.lastSearchQuery = searchQuery || '';
      
      // Show loading in passage card
      document.getElementById('passageCard').style.display = 'block';
      document.getElementById('passageLabel').textContent = '📖 Search Result';
      document.getElementById('passageRef').textContent = reference;
      document.getElementById('passageText').textContent = 'Loading...';
      document.getElementById('searchResults').innerHTML = '';
      
      console.log('Selecting:', reference);
      
      // Fetch passage text from ESV
      try {
        console.log('Fetching from /api/search?q=' + encodeURIComponent(reference));
        const response = await fetch(`/api/search?q=${encodeURIComponent(reference)}`);
        const data = await response.json();
        console.log('Search response:', data);
        
        if (data.error) throw new Error(data.error);
        
        if (data.results && data.results[0]) {
          passageData = {
            ref: reference,
            text: data.results[0].text
          };
          document.getElementById('passageRef').textContent = passageData.ref;
          document.getElementById('passageText').innerHTML = passageData.text;
          
          // Show "Show Full Chapter" button
          const chapterRef = extractChapter(reference);
          if (chapterRef) {
            window.currentChapterRef = chapterRef;
            document.getElementById('contextBtn').style.display = 'block';
          }
          
          // Start chat for the searched passage
          await startChat();
        } else {
          document.getElementById('passageText').textContent = 'No results found.';
        }
      } catch (error) {
        console.error('Error loading passage:', error);
        document.getElementById('passageText').textContent = 'Could not load passage: ' + error.message;
      }
    }
    
    // Load Passage
    async function loadPassage() {
      passageData = getTodayPassage();
      document.getElementById('passageLabel').textContent = '📖 Passage of the Day';
      document.getElementById('passageRef').textContent = passageData.ref;
      document.getElementById('passageText').innerHTML = passageData.text;
      document.getElementById('contextBtn').style.display = 'none';
      
      // Start chat with a brief opener
      await startChat();
    }
    
    // Extract chapter reference from verse (e.g., "John 3:16" -> "John 3")
    function extractChapter(ref) {
      // Match patterns like "John 3:16", "Psalm 23:1", "Romans 8:28"
      const match = ref.match(/^(\d?\s*[A-Za-z]+)\s+(\d+)(?::\d+)?/);
      if (match) {
        return match[1] + ' ' + match[2];
      }
      return null;
    }
    
    // Load full chapter when user clicks the button
    async function loadFullChapter() {
      if (!window.currentChapterRef) return;
      
      const btn = document.getElementById('contextBtn');
      btn.textContent = 'Loading...';
      
      try {
        const response = await fetch(`/api/search?q=${encodeURIComponent(window.currentChapterRef)}`);
        const data = await response.json();
        
        if (data.error) throw new Error(data.error);
        
        if (data.results && data.results[0]) {
          passageData = {
            ref: data.results[0].reference,
            text: data.results[0].text
          };
          document.getElementById('passageRef').textContent = passageData.ref;
          document.getElementById('passageText').innerHTML = passageData.text;
          btn.textContent = '✓ Showing Full Chapter';
          btn.style.background = 'var(--accent)';
          btn.style.color = 'white';
        }
      } catch (error) {
        console.error('Error loading chapter:', error);
        btn.textContent = 'Error loading chapter';
      }
    }
    
    // Start chat with brief opener
    async function startChat() {
      chatHistory = []; // Reset history for new passage
      const messages = document.getElementById('chatMessages');
      messages.innerHTML = '';
      
      const aiMsg = document.createElement('div');
      aiMsg.className = 'chat-message ai';
      aiMsg.textContent = 'Thinking...';
      messages.appendChild(aiMsg);
      
      const searchContext = window.lastSearchQuery ? ` The user originally searched for: "${window.lastSearchQuery}".` : '';
      
      try {
        const prompt = `You are someone who takes the Bible seriously and speaks with conviction about truth. Everything you discuss should point people toward Jesus - the core message of the Bible. You're having a real conversation about this Bible passage: ${passageData.ref}${searchContext}

The passage says: "${passageData.text.replace(/<[^>]*>/g, '').substring(0, 500)}..."

Give ONE short, thought-provoking insight (1 sentence) that explains what this passage actually means and how it points to Jesus. Then ask them what questions they have. Speak with conviction. Be conversational, warm, real. No quotes.`;
        
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt })
        });
        
        const data = await response.json();
        
        if (data.error) throw new Error(data.error);
        
        messages.removeChild(messages.querySelector('.chat-message.ai'));
        const aiMsg = document.createElement('div');
        aiMsg.className = 'chat-message ai';
        aiMsg.textContent = data.content;
        messages.appendChild(aiMsg);
      } catch (error) {
        console.error('Error:', error);
        messages.removeChild(messages.querySelector('.chat-message.ai'));
        const aiMsg = document.createElement('div');
        aiMsg.className = 'chat-message ai';
        aiMsg.textContent = 'What stands out to you about this passage?';
        messages.appendChild(aiMsg);
      }
    }
    
    // Chat
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;
      
      // Add user message
      const messages = document.getElementById('chatMessages');
      const userMsg = document.createElement('div');
      userMsg.className = 'chat-message user';
      userMsg.textContent = message;
      messages.appendChild(userMsg);
      
      // Add to history
      chatHistory.push({ role: 'user', content: message });
      
      const aiMsg = document.createElement('div');
      aiMsg.className = 'chat-message ai';
      aiMsg.textContent = 'Thinking...';
      messages.appendChild(aiMsg);
      
      input.value = '';
      
      // Scroll to bottom
      messages.scrollTop = messages.scrollHeight;
      
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: message,
            passageRef: passageData.ref,
            passageText: passageData.text,
            history: chatHistory
          })
        });
        
        const data = await response.json();
        if (data.error) throw new Error(data.error);
        
        // Update AI response
        const lastMsg = messages.querySelector('.chat-message.ai:last-child');
        lastMsg.textContent = data.content;
        
        // Add to history
        chatHistory.push({ role: 'assistant', content: data.content });
        
        // Show suggestions if any
        if (data.suggestions && data.suggestions.length > 0) {
          const suggestionsDiv = document.createElement('div');
          suggestionsDiv.className = 'chat-suggestions';
          suggestionsDiv.innerHTML = `<p style="margin-bottom:8px;color:var(--text-secondary);font-size:0.9rem;">Related verses you might want to explore:</p>`;
          
          data.suggestions.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'suggestion-btn';
            btn.textContent = s.ref;
            btn.onclick = () => loadSuggestedVerse(s.ref, s.text);
            suggestionsDiv.appendChild(btn);
          });
          
          messages.appendChild(suggestionsDiv);
        }
      } catch (error) {
        const lastMsg = messages.querySelector('.chat-message:last-child');
        lastMsg.textContent = 'Could not get a response. Try again.';
      }
      
      messages.scrollTop = messages.scrollHeight;
    }
    
    async function loadSuggestedVerse(ref, text) {
      // Show main layout if not visible
      document.getElementById('mainLayout').style.display = 'flex';
      document.getElementById('app').classList.add('active');
      document.getElementById('searchContainer').style.display = 'none';
      
      // Update passage on left
      passageData = { ref: ref, text: text };
      document.getElementById('passageLabel').textContent = '📖 Related Verse';
      document.getElementById('passageRef').textContent = ref;
      document.getElementById('passageText').innerHTML = text.replace(/(\d+)/g, '<span class="verse-num">$1</span>').replace(/\n\n/g, '</p><p>').replace(/^(.*)$/, '<p>$1</p>');
      
      // Clear suggestions
      document.querySelectorAll('.chat-suggestions').forEach(el => el.remove());
      
      // Start new chat about this verse
      await startChat();
    }
    
    // Go back to search
    function goBack() {
      document.getElementById('mainLayout').style.display = 'none';
      document.getElementById('searchContainer').style.display = 'block';
      document.getElementById('searchInput').value = '';
      document.getElementById('searchResults').innerHTML = '';
      document.getElementById('chatMessages').innerHTML = '';
      document.getElementById('contextBtn').style.display = 'none';
      document.getElementById('contextBtn').textContent = '📖 Show Full Chapter';
      document.getElementById('contextBtn').style.background = '';
      document.getElementById('contextBtn').style.color = '';
      chatHistory = [];
    }
    
    // Share
    document.getElementById('shareBtn').addEventListener('click', () => {
      if (navigator.share) {
        navigator.share({
          title: 'Seek - Find Truth',
          text: 'Check out Seek - a modern way to explore scripture and big questions.',
          url: window.location.href
        });
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copied to clipboard!');
      }
    });
  </script>
</body>
</html>
