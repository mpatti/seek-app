<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seek - Find Truth</title>
  <!-- Vercel environment variables injection -->
  <script>
    window.ESV_API_KEY = "ESV_API_KEY_PLACEHOLDER";
    window.OPENAI_API_KEY = "OPENAI_API_KEY_PLACEHOLDER";
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg: #0a0a0a;
      --bg-secondary: #141414;
      --card: #1a1a1a;
      --card-hover: #222;
      --accent: #e8c547;
      --accent-glow: rgba(232, 197, 71, 0.3);
      --text: #f5f5f5;
      --text-secondary: #888;
      --text-muted: #555;
      --border: #2a2a2a;
      --success: #4ade80;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }
    
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Header */
    header {
      text-align: center;
      padding: 40px 0;
    }
    
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }
    
    .logo span {
      color: var(--accent);
    }
    
    .tagline {
      color: var(--text-secondary);
      font-size: 1rem;
      font-weight: 300;
    }
    
    /* Onboarding */
    .onboarding {
      display: none;
    }
    
    .onboarding.active {
      display: block;
    }
    
    .question-card {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    
    .question {
      font-size: 1.3rem;
      font-weight: 500;
      margin-bottom: 20px;
      line-height: 1.4;
    }
    
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .option-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      font-family: inherit;
    }
    
    .option-btn:hover {
      background: var(--card-hover);
      border-color: var(--accent);
    }
    
    .option-btn.selected {
      background: rgba(232, 197, 71, 0.1);
      border-color: var(--accent);
    }
    
    .continue-btn {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 18px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      font-family: inherit;
    }
    
    .continue-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px var(--accent-glow);
    }
    
    /* Main App */
    .app {
      display: none;
    }
    
    .app.active {
      display: block;
    }
    
    /* Passage Card */
    .passage-card {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    
    .passage-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 15px;
    }
    
    .passage-reference {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    
    .passage-text {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text-secondary);
    }
    
    /* Commentary */
    .commentary-card {
      background: var(--card);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
    }
    
    .commentary-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .commentary-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #f5a623);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    
    .commentary-name {
      font-weight: 600;
      font-size: 1.1rem;
    }
    
    .commentary-role {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    
    .commentary-text {
      color: var(--text-secondary);
      line-height: 1.8;
      font-size: 1rem;
    }
    
    /* Chat */
    .chat-card {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      border: 1px solid var(--border);
    }
    
    .chat-messages {
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      margin-bottom: 15px;
    }
    
    .chat-message {
      margin-bottom: 15px;
      padding: 15px;
      border-radius: 12px;
      max-width: 85%;
    }
    
    .chat-message.user {
      background: rgba(232, 197, 71, 0.1);
      border: 1px solid var(--accent);
      margin-left: auto;
    }
    
    .chat-message.ai {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
    }
    
    .chat-input-wrapper {
      display: flex;
      gap: 10px;
    }
    
    .chat-input {
      flex: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 15px;
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
    }
    
    .chat-input:focus {
      outline: none;
      border-color: var(--accent);
    }
    
    .send-btn {
      background: var(--accent);
      border: none;
      color: #000;
      padding: 15px 25px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* Share */
    .share-section {
      text-align: center;
      padding: 30px 0;
    }
    
    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 24px;
      border-radius: 30px;
      font-size: 0.9rem;
      cursor: pointer;
    }
    
    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-secondary);
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 15px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Vercel will inject env vars here - or add manually -->
  <script>
    // For Vercel: Add your keys here, or set window.__ENV__ in Vercel dashboard
    window.__ENV__ = window.__ENV__ || {};
  </script>
  <div class="container">
    <header>
      <div class="logo">Seek<span>.</span></div>
      <p class="tagline">Truth. Not trends.</p>
    </header>
    
    <!-- Onboarding -->
    <div class="onboarding active" id="onboarding">
      <div class="question-card" id="q1">
        <div class="question">What brought you here today? 😄</div>
        <div class="options">
          <button class="option-btn" data-value="boredom">Just bored, scrolling around</button>
          <button class="option-btn" data-value="curious">Curious about this Jesus thing</button>
          <button class="option-btn" data-value="struggling">Something going on in my life</button>
          <button class="option-btn" data-value="questions">Big questions I can't shake</button>
          <button class="option-btn" data-value="church">Church wasn't working for me</button>
        </div>
      </div>
      
      <div class="question-card" id="q2" style="display:none;">
        <div class="question">What's been on your mind lately?</div>
        <div class="options">
          <button class="option-btn" data-value="purpose">Purpose / meaning - what even is life?</button>
          <button class="option-btn" data-value="relationships">Relationships / loneliness</button>
          <button class="option-btn" data-value="anxiety">Anxiety / stress / overwhelm</button>
          <button class="option-btn" data-value="truth">Just want some actual truth for once</button>
          <button class="option-btn" data-value="other">None of the above, just exploring</button>
        </div>
      </div>
      
      <button class="continue-btn" id="continueBtn">Continue</button>
    </div>
    
    <!-- Main App -->
    <div class="app" id="app">
      <div class="passage-card">
        <div class="passage-label">📖 Passage of the Day</div>
        <div class="passage-reference" id="passageRef">Loading...</div>
        <div class="passage-text" id="passageText">...</div>
      </div>
      
      <div class="commentary-card">
        <div class="commentary-header">
          <div class="commentary-avatar">📜</div>
          <div>
            <div class="commentary-name">Thoughtful Friend</div>
            <div class="commentary-role">AI Assistant</div>
          </div>
        </div>
        <div class="commentary-text" id="commentaryText">
          Loading insights...
        </div>
      </div>
      
      <div class="chat-card">
        <div class="chat-messages" id="chatMessages">
          <div class="chat-message ai">
            Hey! What questions do you have about today's passage? I'm here to help you think through it.
          </div>
        </div>
        <div class="chat-input-wrapper">
          <input type="text" class="chat-input" id="chatInput" placeholder="Ask anything...">
          <button class="send-btn" id="sendBtn">→</button>
        </div>
      </div>
      
      <div class="share-section">
        <button class="share-btn" id="shareBtn">
          🔗 Share Seek
        </button>
      </div>
    </div>
  </div>
  
  <script>
    // App State
    let answers = {};
    let currentQuestion = 1;
    let passageData = null;
    
    // ESV API Config - reads from Vercel environment variables injected at runtime
    const ESV_API_KEY = window.ESV_API_KEY || '';
    const OPENAI_KEY = window.OPENAI_API_KEY || '';
    
    // Daily passages (for demo - would be fetched or rotated)
    const passages = [
      { ref: "John 3:16-21", text: "For God so loved the world, that he gave his only Son, that whoever believes in him should not perish but have eternal life. For God did not send his Son into the world to condemn the world, but in order that the world might be saved through him. Whoever believes in him is not condemned, but whoever does not believe is condemned already, because he has not believed in the name of the only Son of God. And this is the judgment: the light has come into the world, and people loved the darkness rather than the light because their works were evil. For everyone who does wicked things hates the light and does not come to the light, lest his works should be exposed. But whoever does what comes to the light to clearly that his works have been carried out in God." },
      { ref: "Psalm 23", text: "The Lord is my shepherd; I shall not want. He makes me lie down in green pastures. He leads me beside still waters. He restores my soul. He leads me in paths of righteousness for his name's sake. Even though I walk through the valley of the shadow of death, I will fear no evil, for you are with me; your rod and your staff, they comfort me. You prepare a table before me in the presence of my enemies; you anoint my head with oil; my cup overflows. Surely goodness and mercy shall follow me all the days of my life, and I shall dwell in the house of the Lord forever." },
      { ref: "Romans 8:28", text: "And we know that for those who love God all things work together for good, for those who are called according to his purpose." },
      { ref: "Matthew 7:7-11", text: "Ask, and it will be given to you; seek, and you will find; knock, and it will be opened to you. For everyone who asks receives, and the one who seeks finds, and to the one who knocks it will be opened. Which one of you, if your son asks for bread, will give him a stone? Or if he asks for a fish, will give him a serpent? If you then, who are evil, know how to give good gifts to your children, how much more will your Father who is in heaven give good things to those who ask him!" }
    ];
    
    // Get today's passage
    function getTodayPassage() {
      const today = new Date();
      const index = today.getDate() % passages.length;
      return passages[index];
    }
    
    document.addEventListener('DOMContentLoaded', () => {
    
    // Onboarding Logic
    document.querySelectorAll('.option-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const card = btn.closest('.question-card');
        card.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        answers['q' + currentQuestion] = btn.dataset.value;
      });
    });
    
    document.getElementById('continueBtn').addEventListener('click', () => {
      if (currentQuestion === 1) {
        document.getElementById('q1').style.display = 'none';
        document.getElementById('q2').style.display = 'block';
        currentQuestion = 2;
      } else {
        // Start the app
        document.getElementById('onboarding').classList.remove('active');
        document.getElementById('app').classList.add('active');
        loadPassage();
      }
    });
    
    // Load Passage
    async function loadPassage() {
      passageData = getTodayPassage();
      document.getElementById('passageRef').textContent = passageData.ref;
      document.getElementById('passageText').textContent = passageData.text;
      
      // Generate commentary
      await generateCommentary();
    }
    
    // Generate AI Commentary
    async function generateCommentary() {
      const commentaryEl = document.getElementById('commentaryText');
      commentaryEl.textContent = 'Thinking...';
      
      try {
        const prompt = `You are a thoughtful, wise friend explaining this Bible passage to someone genuinely curious about faith. Think of Tim Keller's intellectual depth, Alastair Begg's Scottish clarity, Frank Turek's logical apologetics, and Billy Graham's warmth - but in a fresh, non-religious way that connects with 2026. 

Passage: ${passageData.ref}
"${passageData.text}"

Write 2-3 paragraphs that:
1. Explain what the passage actually says (keep it simple)
2. Why it matters today
3. How it connects to real life questions

Keep it conversational, not preachy. Don't say "accept Jesus." Just explain truth.`;
        
        // Using OpenAI
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${OPENAI_KEY}`
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: [{ role: 'user', content: prompt }],
            max_tokens: 500
          })
        });
        
        const data = await response.json();
        commentaryEl.textContent = data.choices[0].message.content;
      } catch (error) {
        console.error('Error:', error);
        commentaryEl.textContent = 'Could not load commentary. Try again soon.';
      }
    }
    
    // Chat
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const message = input.value.trim();
      if (!message) return;
      
      // Add user message
      const messages = document.getElementById('chatMessages');
      messages.innerHTML += `<div class="chat-message user">${message}</div>`;
      messages.innerHTML += `<div class="chat-message ai">Thinking...</div>`;
      input.value = '';
      
      // Scroll to bottom
      messages.scrollTop = messages.scrollHeight;
      
      try {
        const prompt = `The user is reading ${passageData.ref}: "${passageData.text}"

The user asks: "${message}"

As a thoughtful, wise friend (Keller/Begg/Turek/Graham style), answer their question about this passage. Keep it conversational, honest, not preachy.`;
        
        const response = await fetch('https://api.openai.com/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${OPENAI_KEY}`
          },
          body: JSON.stringify({
            model: 'gpt-4o-mini',
            messages: [{ role: 'user', content: prompt }],
            max_tokens: 400
          })
        });
        
        const data = await response.json();
        const lastMsg = messages.querySelector('.chat-message:last-child');
        lastMsg.textContent = data.choices[0].message.content;
      } catch (error) {
        const lastMsg = messages.querySelector('.chat-message:last-child');
        lastMsg.textContent = 'Could not get a response. Try again.';
      }
      
      messages.scrollTop = messages.scrollHeight;
    }
    
    // Share
    document.getElementById('shareBtn').addEventListener('click', () => {
      if (navigator.share) {
        navigator.share({
          title: 'Seek - Find Truth',
          text: 'Check out Seek - a modern way to explore scripture and big questions.',
          url: window.location.href
        });
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('Link copied to clipboard!');
      }
    });
    }); // End DOMContentLoaded
  </script>
</body>
</html>
